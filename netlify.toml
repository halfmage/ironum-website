[build]
  publish = "dist"
  command = "npm run build && node scripts/indexnow.mjs"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Language = "en"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://scripts.simpleanalyticscdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://queue.simpleanalyticscdn.com https://*.simpleanalyticscdn.com; frame-ancestors 'none'; base-uri 'self'"

[[headers]]
  for = "/de/*"
  [headers.values]
    Content-Language = "de"
